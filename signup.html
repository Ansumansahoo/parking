<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign Up - ParkEase</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#1a4a2e,#2d8a5e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}.auth-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.3);}.auth-logo{text-align:center;margin-bottom:24px;}.auth-logo a{font-size:1.8rem;font-weight:800;color:#1a3c5e;text-decoration:none;}.auth-logo a span{color:#f5a623;}h2{text-align:center;color:#1a3c5e;margin-bottom:6px;font-size:1.5rem;}.auth-sub{text-align:center;color:#888;font-size:.9rem;margin-bottom:24px;}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}.form-group{margin-bottom:14px;}.form-group label{display:block;font-size:.83rem;color:#555;margin-bottom:5px;font-weight:600;}.req{color:#e74c3c;}.input-wrap{position:relative;}.input-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#aaa;font-size:.9rem;}.form-group input,.form-group select{width:100%;padding:10px 12px 10px 34px;border:1px solid #ddd;border-radius:6px;font-size:.9rem;font-family:inherit;}.form-group input:focus,.form-group select:focus{outline:none;border-color:#1a3c5e;}.gender-opts{display:flex;gap:20px;margin-top:4px;}.gender-opts label{display:flex;align-items:center;gap:6px;font-size:.9rem;color:#555;cursor:pointer;}.btn-auth{width:100%;padding:12px;background:#f5a623;color:#fff;border:none;border-radius:6px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;}.btn-auth:hover{background:#d48a10;}.auth-alt{text-align:center;margin-top:16px;font-size:.9rem;color:#888;}.auth-alt a{color:#1a3c5e;font-weight:700;text-decoration:none;}.success-card{display:none;text-align:center;padding:20px 0;}.success-card i{font-size:3.5rem;color:#2ecc71;margin-bottom:14px;}.success-card h3{color:#1a3c5e;margin-bottom:8px;}.success-card a{display:inline-block;margin-top:14px;padding:10px 24px;background:#f5a623;color:#fff;border-radius:5px;text-decoration:none;font-weight:700;}@media(max-width:480px){.form-row{grid-template-columns:1fr;}}</style></head><body><div class="auth-card"><div class="auth-logo"><a href="index.html">Park<span>Ease</span></a></div><div id="formSection"><h2>Create Account</h2><p class="auth-sub">Join ParkEase and start booking smarter</p><form onsubmit="doSignup(event)"><div class="form-row"><div class="form-group"><label>First Name <span class="req">*</span></label><div class="input-wrap"><i class="fa fa-user"></i><input type="text" required placeholder="First name"></div></div><div class="form-group"><label>Last Name <span class="req">*</span></label><div class="input-wrap"><i class="fa fa-user"></i><input type="text" required placeholder="Last name"></div></div></div><div class="form-group"><label>Email <span class="req">*</span></label><div class="input-wrap"><i class="fa fa-envelope"></i><input type="email" required placeholder="you@example.com"></div></div><div class="form-group"><label>Phone <span class="req">*</span></label><div class="input-wrap"><i class="fa fa-phone"></i><input type="tel" required placeholder="+91 XXXXX XXXXX"></div></div><div class="form-group"><label>Password <span class="req">*</span></label><div class="input-wrap"><i class="fa fa-lock"></i><input type="password" required placeholder="Min. 6 characters" minlength="6"></div></div><div class="form-group"><label>Gender <span class="req">*</span></label><div class="gender-opts"><label><input type="radio" name="gender" value="male" required> Male</label><label><input type="radio" name="gender" value="female"> Female</label><label><input type="radio" name="gender" value="other"> Other</label></div></div><button type="submit" class="btn-auth">Create Account</button></form><p class="auth-alt">Already have an account? <a href="login.html">Sign In</a></p></div><div class="success-card" id="successCard"><i class="fa fa-check-circle"></i><h3>Account Created!</h3><p>Welcome to ParkEase. Your account is ready.</p><a href="login.html">Sign In Now</a></div></div><script>function doSignup(e){e.preventDefault();document.getElementById('formSection').style.display='none';document.getElementById('successCard').style.display='block';}</script></body></html>
