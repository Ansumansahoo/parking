<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign Up — ParkEase</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{--p:#0F2D52;--pl:#1565C0;--a:#F59E0B;--ad:#D97706;--g:#16A34A;--r:#DC2626;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g400:#9CA3AF;--g600:#4B5563;--g800:#1F2937;--tr:all 0.2s ease;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,var(--p) 0%,#1a3a6e 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
.w{width:100%;max-width:500px;}
.brand{text-align:center;margin-bottom:24px;}
.brand a{display:inline-flex;align-items:center;gap:10px;text-decoration:none;}
.bico{width:44px;height:44px;background:var(--a);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--p);font-size:20px;}
.btxt{font-size:1.6rem;font-weight:900;color:#fff;letter-spacing:-0.5px;}
.btxt em{color:var(--a);font-style:normal;}
.card{background:#fff;border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,0.2);overflow:hidden;}
.card-hd{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;padding:26px 32px 22px;}
.card-hd h1{font-size:1.4rem;font-weight:800;margin-bottom:4px;}
.card-hd p{font-size:0.875rem;color:rgba(255,255,255,0.75);}
.card-bd{padding:26px 32px 30px;}
.blive{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(22,163,74,0.08);border:1px solid rgba(22,163,74,0.25);color:var(--g);padding:8px;border-radius:10px;font-size:0.8rem;font-weight:600;margin-bottom:18px;}
.blive::before{content:'';width:7px;height:7px;background:var(--g);border-radius:50%;animation:lp 1.5s ease infinite;}
@keyframes lp{0%,100%{opacity:1}50%{opacity:0.3}}
.fg{margin-bottom:16px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.fl{display:block;font-size:0.78rem;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:7px;}
.fi-w{position:relative;}
.fi-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:14px;pointer-events:none;}
.fi{width:100%;padding:11px 13px 11px 38px;border:1.5px solid var(--g200);border-radius:10px;font-size:0.875rem;font-family:inherit;background:#fff;color:var(--g800);transition:var(--tr);}
.fi:focus{outline:none;border-color:var(--pl);box-shadow:0 0 0 3px rgba(21,101,192,0.1);}
.fi::placeholder{color:var(--g400);}
.fi.no-icon{padding-left:13px;}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--g400);cursor:pointer;font-size:14px;padding:4px;}
.rgroup{display:flex;gap:20px;margin-top:8px;}
.rl{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:0.875rem;color:var(--g800);}
.rl input{accent-color:var(--pl);cursor:pointer;}
.sbtn{width:100%;padding:13px;background:var(--a);color:var(--p);border:none;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;margin-top:22px;}
.sbtn:hover{background:var(--ad);transform:translateY(-1px);box-shadow:0 4px 14px rgba(245,158,11,0.4);}
.aftr{text-align:center;margin-top:18px;font-size:0.875rem;color:rgba(255,255,255,0.7);}
.aftr a{color:var(--a);font-weight:700;text-decoration:none;}
.emsg{background:#fef2f2;border:1px solid #fecaca;color:var(--r);padding:10px 14px;border-radius:10px;font-size:0.82rem;margin-bottom:14px;display:none;align-items:center;gap:8px;}
.emsg.s{display:flex;}
.omsg{background:#f0fdf4;border:1px solid #bbf7d0;color:var(--g);padding:10px 14px;border-radius:10px;font-size:0.82rem;margin-bottom:14px;display:none;align-items:center;gap:8px;}
.omsg.s{display:flex;}</style>
</head>
<body>
<div class="w">
  <div class="brand">
    <a href="index.html"><div class="bico"><i class="fas fa-parking"></i></div>
    <span class="btxt">Park<em>Ease</em></span></a>
  </div>
  <div class="card">
    <div class="card-hd"><h1>Create Your Account</h1><p>Join ParkEase and start booking smarter</p></div>
    <div class="card-bd">
      <div class="blive">Connected to live database</div>
      <div class="emsg" id="em"><i class="fas fa-exclamation-circle"></i> <span id="et">Error</span></div>
      <div class="omsg" id="om"><i class="fas fa-check-circle"></i> Account created! Redirecting to login...</div>
      <div class="fr">
        <div class="fg">
          <label class="fl">First Name *</label>
          <div class="fi-w"><i class="fas fa-user fi-ico"></i><input type="text" id="fn" class="fi" placeholder="First name" required></div>
        </div>
        <div class="fg">
          <label class="fl">Last Name *</label>
          <div class="fi-w"><i class="fas fa-user fi-ico"></i><input type="text" id="ln" class="fi" placeholder="Last name" required></div>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Email Address *</label>
        <div class="fi-w"><i class="fas fa-envelope fi-ico"></i><input type="email" id="email" class="fi" placeholder="you@example.com" autocomplete="email" required></div>
      </div>
      <div class="fg">
        <label class="fl">Phone Number *</label>
        <div class="fi-w"><i class="fas fa-phone fi-ico"></i><input type="tel" id="phone" class="fi" placeholder="+91 XXXXX XXXXX" maxlength="10" required></div>
      </div>
      <div class="fg">
        <label class="fl">Password *</label>
        <div class="fi-w"><i class="fas fa-lock fi-ico"></i>
          <input type="password" id="password" class="fi" placeholder="Min. 6 characters" autocomplete="new-password" required>
          <button class="eye" onclick="tp()" type="button"><i class="fas fa-eye" id="ei"></i></button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Gender *</label>
        <div class="rgroup">
          <label class="rl"><input type="radio" name="gender" value="Male" checked> Male</label>
          <label class="rl"><input type="radio" name="gender" value="Female"> Female</label>
          <label class="rl"><input type="radio" name="gender" value="Other"> Other</label>
        </div>
      </div>
      <button class="sbtn" id="sb" onclick="hs()"><i class="fas fa-user-plus"></i> Create Account</button>
    </div>
  </div>
  <p class="aftr">Already have an account? <a href="login.html">Sign In</a></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=window.supabase.createClient('https://xpziztrwufkqndzeguyj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhweml6dHJ3dWZrcW5kemVndXlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMDI5OTIsImV4cCI6MjA5Mzg3ODk5Mn0.-0230c8JwmK71uLAuYgvDyoQaT28Xbadtr0eVJPEoFM');
function tp(){const p=document.getElementById('password'),i=document.getElementById('ei');if(p.type==='password'){p.type='text';i.className='fas fa-eye-slash';}else{p.type='password';i.className='fas fa-eye';}}
async function hs(){
  const fn=document.getElementById('fn').value.trim();
  const ln=document.getElementById('ln').value.trim();
  const email=document.getElementById('email').value.trim().toLowerCase();
  const phone=document.getElementById('phone').value.trim();
  const password=document.getElementById('password').value;
  const gender=document.querySelector('input[name="gender"]:checked').value;
  const btn=document.getElementById('sb');
  const em=document.getElementById('em'),et=document.getElementById('et'),om=document.getElementById('om');
  em.classList.remove('s');
  if(!fn||!ln||!email||!phone||!password){et.textContent='Please fill in all required fields.';em.classList.add('s');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){et.textContent='Please enter a valid email address.';em.classList.add('s');return;}
  if(!/^[0-9]{10}$/.test(phone)){et.textContent='Please enter a valid 10-digit phone number.';em.classList.add('s');return;}
  if(password.length<6){et.textContent='Password must be at least 6 characters.';em.classList.add('s');return;}
  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Creating account...';
  try{
    const{data:existing}=await sb.from('users').select('id').eq('email',email).single();
    if(existing){et.textContent='An account with this email already exists.';em.classList.add('s');btn.disabled=false;btn.innerHTML='<i class="fas fa-user-plus"></i> Create Account';return;}
    const{error}=await sb.from('users').insert([{first_name:fn,last_name:ln,email,phone,gender,password_hash:btoa(password)}]);
    if(error)throw error;
    om.classList.add('s');
    setTimeout(()=>window.location.href='login.html',1800);
  }catch(e){et.textContent=e.message||'Sign up failed. Please try again.';em.classList.add('s');}
  btn.disabled=false;btn.innerHTML='<i class="fas fa-user-plus"></i> Create Account';
}
</script>
</body>
</html>
